<svg width="100%" height="120" viewBox="0 0 800 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap');

    .title {
      font-family: 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 42px;
      font-weight: 700;
      fill: #f5f5f5;
      letter-spacing: 1px;
    }

    .accent {
      fill: #58a6ff; /* azul do GitHub Dark */
    }

    .shadow {
      fill: #010409;
      opacity: 0.35;
    }
  </style>

  <!-- leve sombra atrás do texto -->
  <text x="52" y="68" class="title shadow">
    Olá, sou <tspan class="accent">Tamires Carvalho</tspan>
  </text>

  <!-- texto principal -->
  <text x="50" y="66" class="title">
    Olá, sou <tspan class="accent">Tamires Carvalho</tspan>
  </text>
</svg>
